<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fake News Detector</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --danger: #f85149;
      --ok: #3fb950;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .wrap { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 1.35rem; font-weight: 600; margin: 0 0 0.5rem; }
    p.sub { color: var(--muted); font-size: 0.9rem; margin: 0 0 1.5rem; }
    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 1.25rem 1.35rem;
      border: 1px solid #2d3a4d;
    }
    label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.35rem; }
    textarea {
      width: 100%;
      min-height: 140px;
      padding: 0.75rem;
      border-radius: 8px;
      border: 1px solid #2d3a4d;
      background: #121a26;
      color: var(--text);
      font-size: 0.95rem;
      resize: vertical;
    }
    input[type="file"] {
      width: 100%;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }
    button {
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #out {
      margin-top: 1.25rem;
      padding: 1rem;
      border-radius: 8px;
      background: #121a26;
      border: 1px solid #2d3a4d;
      font-size: 0.95rem;
      display: none;
    }
    #out.show { display: block; }
    #out.err { border-color: var(--danger); color: #ffb4b0; }
    .badge {
      display: inline-block;
      padding: 0.2rem 0.55rem;
      border-radius: 6px;
      font-weight: 700;
      font-size: 0.85rem;
    }
    .badge.fake { background: rgba(248, 81, 73, 0.2); color: var(--danger); }
    .badge.real { background: rgba(63, 185, 80, 0.2); color: var(--ok); }
    .probs { margin-top: 0.75rem; color: var(--muted); font-size: 0.88rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Multimodal fake news check</h1>
    <p class="sub">Paste article text and optionally attach an image. Uses your trained attention-fusion model.</p>
    <div class="card">
      <form id="f">
        <label for="text">Text</label>
        <textarea id="text" name="text" placeholder="Headline or article text…" required></textarea>
        <label for="image">Image (optional)</label>
        <input type="file" id="image" name="image" accept="image/*" />
        <button type="submit" id="go">Predict</button>
      </form>
      <div id="out"></div>
    </div>
  </div>
  <script>
    const f = document.getElementById("f");
    const out = document.getElementById("out");
    const go = document.getElementById("go");

    f.addEventListener("submit", async (e) => {
      e.preventDefault();
      out.className = "";
      out.removeAttribute("style");
      go.disabled = true;
      const fd = new FormData();
      fd.append("text", document.getElementById("text").value);
      const img = document.getElementById("image").files[0];
      if (img) fd.append("image", img);
      try {
        const r = await fetch("/predict", { method: "POST", body: fd });
        const j = await r.json();
        if (!r.ok) throw new Error(j.error || r.statusText);
        const cls = j.label === "Real" ? "real" : "fake";
        out.innerHTML =
          '<span class="badge ' + cls + '">' + j.label + "</span>" +
          '<div class="probs">P(Fake) = ' + j.prob_fake + " · P(Real) = " + j.prob_real + "</div>";
        out.classList.add("show");
      } catch (err) {
        out.textContent = err.message || String(err);
        out.classList.add("show", "err");
      }
      go.disabled = false;
    });
  </script>
</body>
</html>
